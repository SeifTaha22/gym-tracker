<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>تسجيل التمارين — تتبّع الجيم</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/public/styles.css" />
  </head>
  <body>
    <div class="container container-narrow py-4">
      <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
        <div>
          <div class="fs-4 fw-bold">تسجيل التمارين</div>
          <div class="muted">سجّل تمرينك بسرعة. يمكنك حفظه كمفضلة لاستخدامه لاحقًا.</div>
        </div>
        <div class="d-flex gap-2">
          <a class="btn btn-outline-light" href="/dashboard">لوحة التقدم</a>
          <button class="btn btn-outline-light" id="logoutBtn" type="button">خروج</button>
        </div>
      </div>

      <div class="row g-3">
        <div class="col-12 col-lg-5">
          <div class="p-3 p-md-4 rounded-4 glass">
            <div class="d-flex align-items-center justify-content-between mb-3">
              <div class="fw-bold">إضافة تمرين</div>
              <span class="badge badge-soft">اليوم</span>
            </div>

            <div id="err" class="alert alert-danger d-none" role="alert"></div>
            <div id="ok" class="alert alert-success d-none" role="alert">تم الحفظ.</div>

            <div class="mb-3">
              <label class="form-label">اختيار من المفضلة (اختياري)</label>
              <select id="favoritePick" class="form-select">
                <option value="">—</option>
              </select>
              <div class="small-note mt-2">اختر تمرينًا مفضلًا وسيتم تعبئة الاسم/المعدة تلقائيًا.</div>
            </div>

            <form id="form" class="d-grid gap-3">
              <div>
                <label class="form-label">اسم التمرين</label>
                <input id="exerciseName" class="form-control" placeholder="مثال: Bench Press" required />
              </div>
              <div>
                <label class="form-label">نوع المعدة/الجهاز</label>
                <input id="equipmentType" class="form-control" placeholder="مثال: Barbell / Machine / Dumbbell" required />
              </div>
              <div class="row g-2">
                <div class="col-4">
                  <label class="form-label">الوزن (كجم)</label>
                  <input id="weight" type="number" step="0.5" min="0" class="form-control" placeholder="0" required />
                </div>
                <div class="col-4">
                  <label class="form-label">التكرارات</label>
                  <input id="reps" type="number" step="1" min="1" class="form-control" placeholder="8" required />
                </div>
                <div class="col-4">
                  <label class="form-label">المجموعات</label>
                  <input id="sets" type="number" step="1" min="1" class="form-control" placeholder="3" required />
                </div>
              </div>
              <div>
                <label class="form-label">التاريخ والوقت</label>
                <input id="performedAt" type="datetime-local" class="form-control" required />
              </div>

              <div class="d-flex gap-2">
                <button class="btn btn-accent btn-lg flex-fill" type="submit">حفظ</button>
                <button class="btn btn-outline-light btn-lg" id="saveFavBtn" type="button">حفظ كمفضلة</button>
              </div>
            </form>
          </div>
        </div>

        <div class="col-12 col-lg-7">
          <div class="p-3 p-md-4 rounded-4 glass">
            <div class="d-flex align-items-center justify-content-between mb-3">
              <div class="fw-bold">آخر السجلات</div>
              <button class="btn btn-outline-light btn-sm" id="refreshBtn" type="button">تحديث</button>
            </div>
            <div class="table-responsive">
              <table class="table table-sm align-middle mb-0">
                <thead>
                  <tr>
                    <th>التمرين</th>
                    <th>المعدة</th>
                    <th>وزن</th>
                    <th>تكرار</th>
                    <th>مجموعات</th>
                    <th>وقت</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="rows"></tbody>
              </table>
            </div>
            <div class="small-note mt-3">نصيحة: اذهب إلى لوحة التقدم لرؤية الرسوم البيانية.</div>
          </div>
        </div>
      </div>
    </div>

    <script src="/public/app.js"></script>
    <script>
      const { api, byId, fmtDateTimeLocal, ensureAuthedOrRedirect, logout } = window.GymApp;

      const err = byId("err");
      const ok = byId("ok");
      const showErr = (m) => {
        err.textContent = m;
        err.classList.remove("d-none");
      };
      const showOk = () => {
        ok.classList.remove("d-none");
        setTimeout(() => ok.classList.add("d-none"), 1500);
      };
      const clearErr = () => err.classList.add("d-none");

      function setNow() {
        byId("performedAt").value = fmtDateTimeLocal(new Date().toISOString());
      }

      function rowHtml(w) {
        const d = new Date(w.performedAt);
        const time = Number.isNaN(d.getTime()) ? "" : d.toLocaleString("ar-EG");
        return `
          <tr>
            <td class="fw-semibold">${escapeHtml(w.exerciseName)}</td>
            <td class="muted">${escapeHtml(w.equipmentType)}</td>
            <td>${w.weight}</td>
            <td>${w.reps}</td>
            <td>${w.sets}</td>
            <td class="muted">${escapeHtml(time)}</td>
            <td class="text-nowrap">
              <button class="btn btn-outline-light btn-sm" data-action="edit" data-id="${w.id}">تعديل</button>
              <button class="btn btn-outline-danger btn-sm" data-action="del" data-id="${w.id}">حذف</button>
            </td>
          </tr>
        `;
      }

      function escapeHtml(s) {
        return String(s)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      let currentWorkouts = [];

      async function loadFavorites() {
        const { favorites } = await api("/api/favorites");
        const sel = byId("favoritePick");
        sel.innerHTML = `<option value="">—</option>`;
        for (const f of favorites) {
          const opt = document.createElement("option");
          opt.value = f.id;
          opt.textContent = `${f.exerciseName} — ${f.equipmentType}`;
          opt.dataset.exerciseName = f.exerciseName;
          opt.dataset.equipmentType = f.equipmentType;
          sel.appendChild(opt);
        }
      }

      async function loadWorkouts() {
        const { workouts } = await api("/api/workouts?limit=50");
        currentWorkouts = workouts;
        byId("rows").innerHTML = workouts.map(rowHtml).join("");
      }

      function fillFromWorkout(w) {
        byId("exerciseName").value = w.exerciseName;
        byId("equipmentType").value = w.equipmentType;
        byId("weight").value = w.weight;
        byId("reps").value = w.reps;
        byId("sets").value = w.sets;
        byId("performedAt").value = fmtDateTimeLocal(w.performedAt);
      }

      async function saveFavoriteFromForm() {
        clearErr();
        const exerciseName = byId("exerciseName").value.trim();
        const equipmentType = byId("equipmentType").value.trim();
        if (!exerciseName || !equipmentType) return showErr("أدخل اسم التمرين ونوع المعدة أولاً.");
        try {
          await api("/api/favorites", { method: "POST", body: JSON.stringify({ exerciseName, equipmentType }) });
          await loadFavorites();
          showOk();
        } catch {
          showErr("تعذر حفظ المفضلة.");
        }
      }

      async function createWorkoutFromForm() {
        clearErr();
        const payload = {
          exerciseName: byId("exerciseName").value.trim(),
          equipmentType: byId("equipmentType").value.trim(),
          weight: byId("weight").value,
          reps: byId("reps").value,
          sets: byId("sets").value,
          performedAt: new Date(byId("performedAt").value).toISOString(),
        };
        try {
          await api("/api/workouts", { method: "POST", body: JSON.stringify(payload) });
          showOk();
          await loadWorkouts();
        } catch (e) {
          showErr("تأكد من صحة المدخلات.");
        }
      }

      async function deleteWorkout(id) {
        clearErr();
        if (!confirm("هل تريد حذف هذا السجل؟")) return;
        await api(`/api/workouts/${id}`, { method: "DELETE" });
        await loadWorkouts();
      }

      async function editWorkout(id) {
        const w = currentWorkouts.find((x) => x.id === id);
        if (!w) return;
        fillFromWorkout(w);
        const ok = confirm("تم تعبئة النموذج بالبيانات. عدّل القيم ثم اضغط (حفظ) ليتم إنشاء سجل جديد.\n\nلتعديل نفس السجل: اضغط موافق.");
        if (!ok) return;
        clearErr();
        const payload = {
          exerciseName: byId("exerciseName").value.trim(),
          equipmentType: byId("equipmentType").value.trim(),
          weight: byId("weight").value,
          reps: byId("reps").value,
          sets: byId("sets").value,
          performedAt: new Date(byId("performedAt").value).toISOString(),
        };
        try {
          await api(`/api/workouts/${id}`, { method: "PUT", body: JSON.stringify(payload) });
          showOk();
          await loadWorkouts();
        } catch {
          showErr("تعذر تعديل السجل.");
        }
      }

      (async function init() {
        await ensureAuthedOrRedirect();
        setNow();
        await loadFavorites();
        await loadWorkouts();
      })();

      byId("logoutBtn").addEventListener("click", logout);
      byId("refreshBtn").addEventListener("click", () => loadWorkouts());
      byId("saveFavBtn").addEventListener("click", saveFavoriteFromForm);

      byId("favoritePick").addEventListener("change", (e) => {
        const opt = e.target.selectedOptions?.[0];
        if (!opt || !opt.dataset.exerciseName) return;
        byId("exerciseName").value = opt.dataset.exerciseName;
        byId("equipmentType").value = opt.dataset.equipmentType;
      });

      byId("form").addEventListener("submit", async (e) => {
        e.preventDefault();
        await createWorkoutFromForm();
      });

      byId("rows").addEventListener("click", async (e) => {
        const btn = e.target.closest("button");
        if (!btn) return;
        const action = btn.dataset.action;
        const id = btn.dataset.id;
        if (action === "del") return deleteWorkout(id);
        if (action === "edit") return editWorkout(id);
      });
    </script>
  </body>
</html>
