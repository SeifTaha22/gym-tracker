<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>لوحة التقدم — تتبّع الجيم</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/public/styles.css" />
  </head>
  <body>
    <div class="container container-narrow py-4">
      <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
        <div>
          <div class="fs-4 fw-bold">لوحة التقدم</div>
          <div class="muted">اختر تمرينًا وشاهد تطور الوزن/التكرارات عبر الوقت.</div>
        </div>
        <div class="d-flex gap-2">
          <a class="btn btn-outline-light" href="/app">تسجيل التمارين</a>
          <button class="btn btn-outline-light" id="logoutBtn" type="button">خروج</button>
        </div>
      </div>

      <div class="row g-3">
        <div class="col-12 col-lg-4">
          <div class="p-3 p-md-4 rounded-4 glass">
            <div class="fw-bold mb-3">فلترة</div>
            <div class="d-grid gap-3">
              <div>
                <label class="form-label">التمرين</label>
                <select id="exercisePick" class="form-select"></select>
              </div>
              <div class="row g-2">
                <div class="col-6">
                  <label class="form-label">من</label>
                  <input id="from" type="date" class="form-control" />
                </div>
                <div class="col-6">
                  <label class="form-label">إلى</label>
                  <input id="to" type="date" class="form-control" />
                </div>
              </div>
              <button class="btn btn-accent" id="applyBtn" type="button">تطبيق</button>
              <div class="small-note">
                ملاحظة: الرسوم تعتمد على السجلات التي سجلتها في صفحة تسجيل التمارين.
              </div>
            </div>
          </div>
        </div>

        <div class="col-12 col-lg-8">
          <div class="p-3 p-md-4 rounded-4 glass">
            <div class="d-flex align-items-center justify-content-between mb-3">
              <div class="fw-bold">الرسوم البيانية</div>
              <span id="summary" class="small-note"></span>
            </div>
            <div class="mb-4">
              <div class="muted mb-2">تطور الوزن (كجم)</div>
              <canvas id="weightChart" height="140"></canvas>
            </div>
            <div>
              <div class="muted mb-2">التكرارات والمجموعات</div>
              <canvas id="volumeChart" height="140"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="/public/app.js"></script>
    <script>
      const { api, byId, ensureAuthedOrRedirect, logout } = window.GymApp;
      let weightChart = null;
      let volumeChart = null;

      function uniq(arr) {
        return [...new Set(arr)];
      }

      function toISODate(d) {
        const pad = (n) => String(n).padStart(2, "0");
        return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
      }

      function buildCharts(points) {
        const labels = points.map((p) => p.label);
        const weights = points.map((p) => p.weight);
        const reps = points.map((p) => p.reps);
        const sets = points.map((p) => p.sets);

        const common = {
          responsive: true,
          plugins: {
            legend: { labels: { color: "rgba(255,255,255,0.82)" } },
            tooltip: { rtl: true },
          },
          scales: {
            x: { ticks: { color: "rgba(255,255,255,0.65)" }, grid: { color: "rgba(255,255,255,0.06)" } },
            y: { ticks: { color: "rgba(255,255,255,0.65)" }, grid: { color: "rgba(255,255,255,0.06)" } },
          },
        };

        if (weightChart) weightChart.destroy();
        if (volumeChart) volumeChart.destroy();

        weightChart = new Chart(byId("weightChart"), {
          type: "line",
          data: {
            labels,
            datasets: [
              {
                label: "الوزن (كجم)",
                data: weights,
                borderColor: "rgba(110,231,255,0.9)",
                backgroundColor: "rgba(110,231,255,0.14)",
                tension: 0.25,
                fill: true,
                pointRadius: 3,
              },
            ],
          },
          options: common,
        });

        volumeChart = new Chart(byId("volumeChart"), {
          type: "bar",
          data: {
            labels,
            datasets: [
              { label: "التكرارات", data: reps, backgroundColor: "rgba(167,139,250,0.45)" },
              { label: "المجموعات", data: sets, backgroundColor: "rgba(110,231,255,0.35)" },
            ],
          },
          options: common,
        });
      }

      async function loadData() {
        const from = byId("from").value ? new Date(byId("from").value).toISOString() : "";
        const to = byId("to").value ? new Date(byId("to").value + "T23:59:59").toISOString() : "";

        const qs = new URLSearchParams();
        qs.set("limit", "500");
        if (from) qs.set("from", from);
        if (to) qs.set("to", to);

        const { workouts } = await api("/api/workouts?" + qs.toString());
        const allExercises = uniq(workouts.map((w) => w.exerciseName)).sort((a, b) => a.localeCompare(b, "ar"));

        const pick = byId("exercisePick");
        const prev = pick.value;
        pick.innerHTML = "";
        for (const ex of allExercises) {
          const opt = document.createElement("option");
          opt.value = ex;
          opt.textContent = ex;
          pick.appendChild(opt);
        }

        if (prev && allExercises.includes(prev)) pick.value = prev;
        if (!pick.value && allExercises[0]) pick.value = allExercises[0];

        const filtered = workouts
          .filter((w) => w.exerciseName === pick.value)
          .slice()
          .sort((a, b) => new Date(a.performedAt) - new Date(b.performedAt));

        const points = filtered.map((w) => ({
          label: new Date(w.performedAt).toLocaleDateString("ar-EG"),
          weight: w.weight,
          reps: w.reps,
          sets: w.sets,
        }));

        byId("summary").textContent = filtered.length ? `عدد السجلات: ${filtered.length}` : "لا توجد سجلات لهذا التمرين.";
        buildCharts(points);
      }

      (async function init() {
        await ensureAuthedOrRedirect();
        const now = new Date();
        byId("to").value = toISODate(now);
        const monthAgo = new Date(now.getTime() - 1000 * 60 * 60 * 24 * 30);
        byId("from").value = toISODate(monthAgo);
        await loadData();
      })();

      byId("logoutBtn").addEventListener("click", logout);
      byId("applyBtn").addEventListener("click", loadData);
      byId("exercisePick").addEventListener("change", loadData);
    </script>
  </body>
</html>
